<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>歡迎來到我的 GitHub 網站！</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 40px;
            background-color: #ffffff;
        }
        h1 { color: #000000; }
        p { color: #333333; }
        
        /* 設定地圖的寬度和高度 */
        #map {
            margin-top: 20px;
            height: 450px;
            width: 100%;
            border: 1px solid #ccc;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <h1>歡迎來到我的 GitHub 網站！</h1>
    <p>這是用 GitHub Pages 成功建立的網站。</p>

    <div id="map"></div>

    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyA6X_jnYl1SBCbEPMiiTEHOCAudU3J451M&callback=initMap" async defer></script>

    <script>
        function initMap() {
            // 設定地圖中心點（預設台北車站）
            const myLocation = { lat: 25.0478, lng: 121.5170 };
            
            // 建立地圖
            const map = new google.maps.Map(document.getElementById("map"), {
                center: myLocation,
                zoom: 15
            });

            // 加上紅色大頭針
            new google.maps.Marker({
                position: myLocation,
                map: map,
                title: "我的位置"
            });
        }
    </script>

</body>
</html>
